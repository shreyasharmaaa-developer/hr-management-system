<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Attendance – HR System</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo"><i class="fas fa-users-cog"></i><span>HR System</span></div>
      <button class="toggle-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
    </div>
    <nav class="sidebar-nav">
      <a href="../index.html" class="nav-item"><i class="fas fa-tachometer-alt"></i><span>Dashboard</span></a>
      <a href="employees.html" class="nav-item"><i class="fas fa-user-tie"></i><span>Employees</span></a>
      <a href="attendance.html" class="nav-item active"><i class="fas fa-calendar-check"></i><span>Attendance</span></a>
      <a href="payroll.html" class="nav-item"><i class="fas fa-money-bill-wave"></i><span>Payroll</span></a>
      <a href="leave.html" class="nav-item"><i class="fas fa-calendar-times"></i><span>Leave Management</span></a>
      <a href="recruitment.html" class="nav-item"><i class="fas fa-user-plus"></i><span>Recruitment</span></a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-info">
        <div class="avatar">AD</div>
        <div><div class="user-name">Admin User</div><div class="user-role">HR Manager</div></div>
      </div>
    </div>
  </div>

  <div class="main-content">
    <header class="topbar">
      <div class="page-title">
        <h1>Attendance</h1>
        <p>Daily attendance tracking &amp; records</p>
      </div>
      <div class="page-actions">
        <input type="date" class="form-control" style="width:auto" id="attDate">
        <button class="btn btn-primary"><i class="fas fa-download"></i> Export</button>
      </div>
    </header>

    <section class="stats-grid">
      <div class="stat-card green"><div class="stat-icon"><i class="fas fa-user-check"></i></div><div class="stat-info"><div class="stat-number" data-target="213">0</div><div class="stat-label">Present</div></div></div>
      <div class="stat-card" style="border-top:3px solid #ef4444"><div class="stat-icon" style="background:#fee2e2;color:#ef4444"><i class="fas fa-user-times"></i></div><div class="stat-info"><div class="stat-number" data-target="17">0</div><div class="stat-label">Absent</div></div><div class="stat-trend down"><i class="fas fa-arrow-down"></i> 2%</div></div>
      <div class="stat-card orange"><div class="stat-icon"><i class="fas fa-clock"></i></div><div class="stat-info"><div class="stat-number" data-target="9">0</div><div class="stat-label">Late Arrivals</div></div></div>
      <div class="stat-card purple"><div class="stat-icon"><i class="fas fa-calendar-alt"></i></div><div class="stat-info"><div class="stat-number" data-target="18">0</div><div class="stat-label">On Leave</div></div></div>
    </section>

    <div class="card">
      <div class="card-header">
        <h2>Today's Attendance</h2>
        <div class="search-bar">
          <i class="fas fa-search"></i>
          <input type="text" id="attSearch" placeholder="Search...">
        </div>
      </div>
      <div class="table-container">
        <table id="attTable">
          <thead>
            <tr><th>Employee</th><th>Emp ID</th><th>Department</th><th>Check In</th><th>Check Out</th><th>Hours</th><th>Status</th></tr>
          </thead>
          <tbody id="attTableBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="../js/main.js"></script>
  <script>
    const attendance = [
      { name:'Rahul Sharma', initials:'RS', color:'#4f46e5', empId:'EMP-001', dept:'Engineering', checkIn:'09:02 AM', checkOut:'06:15 PM', hours:'9h 13m', status:'present', statusLabel:'Present' },
      { name:'Priya Gupta', initials:'PG', color:'#10b981', empId:'EMP-002', dept:'Marketing', checkIn:'–', checkOut:'–', hours:'–', status:'leave', statusLabel:'On Leave' },
      { name:'Amit Kumar', initials:'AK', color:'#f59e0b', empId:'EMP-003', dept:'Operations', checkIn:'10:35 AM', checkOut:'07:00 PM', hours:'8h 25m', status:'late', statusLabel:'Late' },
      { name:'Neha Kapoor', initials:'NK', color:'#8b5cf6', empId:'EMP-005', dept:'HR', checkIn:'08:58 AM', checkOut:'05:58 PM', hours:'9h 00m', status:'present', statusLabel:'Present' },
      { name:'Vikram Singh', initials:'VS', color:'#06b6d4', empId:'EMP-006', dept:'Sales', checkIn:'–', checkOut:'–', hours:'–', status:'absent', statusLabel:'Absent' },
    ];

    function renderAttendance(data) {
      document.getElementById('attTableBody').innerHTML = (data || attendance).map(e => `
        <tr>
          <td><div class="emp-cell">
            <div class="emp-avatar" style="background:${e.color}">${e.initials}</div>
            <div class="emp-name">${e.name}</div>
          </div></td>
          <td>${e.empId}</td>
          <td>${e.dept}</td>
          <td>${e.checkIn}</td>
          <td>${e.checkOut}</td>
          <td>${e.hours}</td>
          <td><span class="badge-status ${e.status}">${e.statusLabel}</span></td>
        </tr>`).join('');
    }

    document.getElementById('attSearch').addEventListener('input', function() {
      const q = this.value.toLowerCase();
      renderAttendance(attendance.filter(e =>
        e.name.toLowerCase().includes(q) ||
        e.empId.toLowerCase().includes(q) ||
        e.dept.toLowerCase().includes(q) ||
        e.statusLabel.toLowerCase().includes(q)
      ));
    });

    document.getElementById('attDate').valueAsDate = new Date();
    renderAttendance();
  </script>
</body>
</html>
